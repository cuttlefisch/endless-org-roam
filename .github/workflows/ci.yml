name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['28.1', '29.4', '30.1', 'snapshot']
    # Emacs 28.1 may fail due to upstream dependency resolution
    continue-on-error: ${{ matrix.emacs-version == '28.1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: conao3/setup-cask@master
      - name: Debug package archives
        if: matrix.emacs-version == '28.1'
        run: |
          emacs --batch --eval '
            (progn
              (require (quote package))
              (package-initialize)
              (message "Archives: %S" package-archives)
              (message "Emacs: %s" emacs-version)
              (message "TLS: %S" (gnutls-available-p))
              (package-refresh-contents)
              (message "org-roam available: %S"
                       (assq (quote org-roam) package-archive-contents)))'
      - name: Install dependencies
        run: cask install
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '30.1'
      - uses: conao3/setup-cask@master
      - run: cask install
      - run: make lint
