name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version: ['28.1', '29.4', '30.1', 'snapshot']
    # Emacs 28.1 may fail due to upstream dependency resolution
    continue-on-error: ${{ matrix.emacs-version == '28.1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - uses: conao3/setup-cask@master
      - name: Install dependencies
        if: matrix.emacs-version != '28.1'
        run: cask install
      - name: Install dependencies (28.1 debug)
        if: matrix.emacs-version == '28.1'
        run: |
          cask install 2>&1 || {
            echo "--- cask install failed, trying verbose ---"
            emacs --batch -L . --eval '
              (progn
                (require (quote package))
                (setq package-archives
                      (quote (("gnu" . "https://elpa.gnu.org/packages/")
                              ("melpa" . "https://melpa.org/packages/"))))
                (package-initialize)
                (package-refresh-contents)
                (message "org-roam versions: %S"
                         (cdr (assq (quote org-roam) package-archive-contents)))
                (condition-case err
                    (package-install (quote org-roam))
                  (error (message "Install error: %S" err))))'
            exit 1
          }
      - run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '30.1'
      - uses: conao3/setup-cask@master
      - run: cask install
      - run: make lint
